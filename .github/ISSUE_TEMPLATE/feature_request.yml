name: Feature request
description: Suggest an addition or change to the spec or the site
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: For open-ended spec discussion, consider starting a Discussion instead. Use this form for a concrete proposal.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, if any.
    validations:
      required: false
