name: Sync downstream mirror

# GitHub is the canonical repository. This workflow triggers a downstream
# read-only mirror to pull the latest changes on every push, so the mirror
# stays current without waiting for its periodic poll.
#
# The mirror endpoint URL and token are stored as repository secrets, so no
# infrastructure details are committed to this public repository. If the
# secrets are absent, the job skips cleanly and the mirror still syncs on its
# own periodic schedule.

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: downstream-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mirror sync
        env:
          SYNC_URL: ${{ secrets.MIRROR_SYNC_URL }}
          SYNC_TOKEN: ${{ secrets.MIRROR_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$SYNC_TOKEN" ]; then
            echo "Mirror sync secrets are not set; skipping. The mirror will still sync on its periodic schedule."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $SYNC_TOKEN" "$SYNC_URL")
          echo "mirror sync HTTP status: $code"
          if [ "$code" != "200" ] && [ "$code" != "202" ]; then
            echo "Unexpected status from mirror sync."
            exit 1
          fi
